<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Local laptop and remote cloud connected through GitHub</title>
  <desc id="desc">Two circles labeled local and remote, linked by a line with GitHub in the middle. Small labels for main and origin.</desc>
  <defs>
    <radialGradient id="glow" cx="12%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="220" fill="#09090b" rx="10"/>
  <rect width="640" height="220" fill="url(#glow)" rx="10"/>
  <!-- connector -->
  <line x1="128" y1="110" x2="512" y2="110" stroke="#52525b" stroke-width="1.25"/>
  <!-- left node -->
  <circle cx="110" cy="110" r="56" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="110" y="102" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">LOCAL /</text>
  <text x="110" y="118" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">LAPTOP</text>
  <text x="110" y="168" text-anchor="middle" fill="#71717a" font-family="ui-monospace,monospace" font-size="10">main</text>
  <!-- center: GitHub Invertocat mark (official silhouette, scaled) -->
  <circle cx="320" cy="110" r="26" fill="#18181b" stroke="#52525b" stroke-width="1"/>
  <g transform="translate(320, 110) scale(0.28) translate(-49, -48)">
    <path
      fill="#fafafa"
      fill-rule="evenodd"
      clip-rule="evenodd"
      d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"
    />
  </g>
  <text x="320" y="156" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11">GitHub</text>
  <!-- right node -->
  <circle cx="530" cy="110" r="56" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="530" y="102" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">REMOTE /</text>
  <text x="530" y="118" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">CLOUD</text>
  <text x="530" y="168" text-anchor="middle" fill="#71717a" font-family="ui-monospace,monospace" font-size="10">origin</text>
</svg>
